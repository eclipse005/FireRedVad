name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create the GitHub Release

jobs:
  build:
    name: build / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: fireredvad-linux-x86_64
            bin: fireredvad
          # Linux arm64 (aarch64)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: fireredvad-linux-aarch64
            bin: fireredvad
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: fireredvad-windows-x86_64
            bin: fireredvad.exe
          # macOS arm64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: fireredvad-macos-aarch64
            bin: fireredvad

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target -> ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Test
        run: cargo test --release --locked --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Show downloaded files
        run: ls -la artifacts/*/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/fireredvad-linux-x86_64/fireredvad
            artifacts/fireredvad-linux-aarch64/fireredvad
            artifacts/fireredvad-windows-x86_64/fireredvad.exe
            artifacts/fireredvad-macos-aarch64/fireredvad
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
