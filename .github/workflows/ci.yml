name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: fireredvad-linux-x86_64
            bin: fireredvad
          # Linux arm64 (aarch64)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: fireredvad-linux-aarch64
            bin: fireredvad
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: fireredvad-windows-x86_64
            bin: fireredvad.exe
          # macOS arm64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: fireredvad-macos-aarch64
            bin: fireredvad

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target -> ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Test
        run: cargo test --release --locked --target ${{ matrix.target }}

      - name: Smoke run
        # Linux/macOS runners only — Windows runner can't show a TTY, and we
        # don't want to add a sample wav just for CI smoke-testing.
        if: matrix.os != 'windows-latest'
        run: |
          ./target/${{ matrix.target }}/release/${{ matrix.bin }} 2>&1 | head -n 5 || true

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
          if-no-files-found: error
          retention-days: 14
